<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Day-Ahead Price Monitor | Belgian Electricity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --engie-blue:#0079cc;
  --engie-blue-hover:#005a97;
  --engie-blue-active:#003f6a;
  --engie-teal:#23d2b5;
  --engie-gradient:linear-gradient(132deg,#0079cc -30%,#23d2b5 133%);
  --engie-purple:#1f106d;
  --engie-red:#e74a50;
  --engie-orange:#d04800;
  --engie-yellow:#fbdb3c;
  --engie-green:#6ed2b1;
  --engie-green-fun:#4b9726;
  --engie-accent-green:#009934;
  --grey-900:#212121;
  --grey-800:#424242;
  --grey-700:#616161;
  --grey-600:#757575;
  --grey-500:#9e9e9e;
  --grey-400:#bdbdbd;
  --grey-300:#e0e0e0;
  --grey-200:#eee;
  --grey-100:#f5f5f5;
  --danger-text:#a94442;
  --danger-bg:#f2dede;
  --success-text:#3c763d;
  --success-bg:#dff0d8;
  --warning-text:#8a6d3b;
  --warning-bg:#fcf8e3;
  --radius:8px;
  --radius-sm:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',Arial,sans-serif;background:var(--grey-100);color:var(--grey-900);font-weight:400;font-size:14px;line-height:1.5}
/* ── Header bar ── */
.header-bar{background:var(--engie-gradient);padding:20px 24px 18px;color:#fff}
.header-bar .container{max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:16px}
.header-bar .logo{font-size:24px;font-weight:900;letter-spacing:.5px;text-transform:uppercase}
.header-bar .logo span{font-weight:300;opacity:.85}
.header-bar h1{font-size:18px;font-weight:700;margin:0;flex:1}
/* ── Container ── */
.container{max-width:1040px;margin:0 auto;padding:0 24px}
.main{padding:24px 0 40px}
/* ── Navigation ── */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.date-nav button{
  background:#fff;border:1px solid var(--grey-300);border-radius:var(--radius);
  padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  color:var(--grey-800);transition:all .15s
}
.date-nav button:hover{border-color:var(--engie-blue);color:var(--engie-blue)}
.date-nav button.active{
  background:var(--engie-blue);color:#fff;border-color:var(--engie-blue)
}
.date-nav span{font-size:14px;font-weight:700;color:var(--grey-700)}
/* ── Subtitle ── */
.subtitle{font-size:13px;color:var(--grey-600);margin-bottom:24px;font-weight:400}
/* ── Alert banners ── */
.alert-banner{padding:14px 18px;border-radius:var(--radius);margin-bottom:20px;border:1px solid}
.alert-neg{background:var(--danger-bg);border-color:#ebccd1}
.alert-ok{background:var(--success-bg);border-color:#d6e9c6}
.alert-title{font-size:15px;font-weight:700;margin-bottom:6px}
.alert-title.neg{color:var(--danger-text)}
.alert-title.ok{color:var(--success-text)}
.neg-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{background:#fff;border:1px solid #ebccd1;border-radius:var(--radius-sm);padding:3px 10px;font-size:13px;color:var(--danger-text);font-weight:700}
.implications{font-size:13px;color:var(--grey-600);margin-top:8px}
/* ── Metric tiles ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.metric{background:#fff;border-radius:var(--radius);padding:18px 16px;border:1px solid var(--grey-300)}
.metric-label{font-size:12px;color:var(--grey-600);margin-bottom:6px;font-weight:400;text-transform:uppercase;letter-spacing:.3px}
.metric-value{font-size:24px;font-weight:900;color:var(--grey-900)}
.metric-value.danger{color:var(--engie-red)}
/* ── Cards ── */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--grey-300);padding:18px 20px;margin-bottom:20px}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--grey-900)}
/* ── Legend ── */
.legend{display:flex;gap:16px;margin-bottom:14px;font-size:12px;color:var(--grey-600);align-items:center;flex-wrap:wrap;font-weight:400}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
.legend-stripe{width:10px;height:10px;display:inline-block;margin-right:5px;background:repeating-linear-gradient(45deg,rgba(31,16,109,.12),rgba(31,16,109,.12) 2px,rgba(31,16,109,.04) 2px,rgba(31,16,109,.04) 4px);border-radius:2px;vertical-align:middle}
/* ── Charts ── */
.chart-wrap{position:relative;width:100%;height:280px}
/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 8px;font-weight:700;color:var(--grey-600);border-bottom:2px solid var(--grey-300);text-transform:uppercase;font-size:11px;letter-spacing:.4px}
td{padding:8px;border-bottom:1px solid var(--grey-200)}
tr.neg-row{background:var(--danger-bg)}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);border:1px solid;font-weight:700}
.badge-neg{background:var(--danger-bg);color:var(--danger-text);border-color:#ebccd1}
.badge-low{background:var(--warning-bg);color:var(--warning-text);border-color:#faebcc}
.badge-ok{background:var(--success-bg);color:var(--success-text);border-color:#d6e9c6}
/* ── Footer ── */
.footer{font-size:12px;color:var(--grey-500);border-top:1px solid var(--grey-300);padding:16px 0;display:flex;flex-wrap:wrap;gap:16px;margin-top:8px}
/* ── Loading / Error ── */
.loading{text-align:center;padding:60px 20px;color:var(--grey-600);font-size:15px;font-weight:400}
.error{text-align:center;padding:60px 20px;color:var(--danger-text);font-size:15px}
/* ── Progress bar ── */
.progress-bar-outer{width:100%;height:6px;background:var(--grey-300);border-radius:3px;margin:14px 0}
.progress-bar-inner{height:100%;background:var(--engie-gradient);border-radius:3px;transition:width .2s}
/* ── YTD table rows ── */
.ytd-day-row{cursor:pointer;transition:background .1s}
.ytd-day-row:hover{background:var(--grey-100)}
.ytd-detail{display:none;background:#fafafa}
.ytd-detail td{padding-left:28px;color:var(--grey-600);font-size:12px}
/* ── Weekend vs Weekday tile ── */
.wk-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:0}
.wk-compare-col{background:var(--grey-100);border-radius:var(--radius);padding:16px;border:1px solid var(--grey-200)}
.wk-compare-col h4{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--engie-blue)}
.wk-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--grey-200);font-size:13px}
.wk-row:last-child{border-bottom:none}
.wk-label{color:var(--grey-600);font-weight:400}
.wk-val{font-weight:700}
.wk-val.danger{color:var(--engie-red)}
.wk-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:10px}
.wk-bar-label{font-size:11px;color:var(--grey-600);white-space:nowrap;font-weight:700}
@media(max-width:640px){
  .wk-compare{grid-template-columns:1fr}
  .header-bar .container{flex-direction:column;align-items:flex-start;gap:4px}
  .metrics{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- ENGIE-style gradient header -->
<div class="header-bar">
  <div class="container">
    <div class="logo">ENGIE <span>energy</span></div>
    <h1>Day-Ahead Price Monitor</h1>
  </div>
</div>

<div class="container main">
  <div class="date-nav">
    <button id="btn-today">Today</button>
    <button id="btn-tomorrow">Tomorrow</button>
    <button id="btn-ytd">YTD Negative Hours</button>
    <span id="date-label"></span>
  </div>
  <div id="content"><div class="loading">Loading prices...</div></div>
  <div class="footer">
    <span>Source: griddata.elia.be &mdash; BZN|BE Day-Ahead (EPEX SPOT via Elia)</span>
    <span id="retrieved"></span>
  </div>
</div>

<script>
let chart = null;
let ytdChart = null;

/* ── ENGIE color palette for charts ── */
const C = {
  green: '#6ed2b1',       // normal prices
  yellow: '#fbdb3c',      // low prices
  red: '#e74a50',         // negative prices
  blue: '#0079cc',        // primary
  teal: '#23d2b5',        // accent
  purple: '#1f106d',      // secondary / weekend
  lightBlue: '#85B7EB',   // prev year
  orange: '#d04800',      // accent
};

/* ── Weekend background plugin for Chart.js ── */
const weekendBgPlugin = {
  id: 'weekendBg',
  beforeDraw(chart) {
    const meta = chart.config._weekendFlags;
    if (!meta) return;
    const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
    ctx.save();
    ctx.fillStyle = 'rgba(31, 16, 109, 0.06)';
    for (let i = 0; i < meta.length; i++) {
      if (!meta[i]) continue;
      const xCenter = x.getPixelForValue(i);
      const barWidth = x.width / meta.length;
      ctx.fillRect(xCenter - barWidth / 2, top, barWidth, bottom - top);
    }
    ctx.restore();
  }
};
Chart.register(weekendBgPlugin);

/* ── Chart.js global defaults for ENGIE look ── */
Chart.defaults.font.family = "'Lato', Arial, sans-serif";
Chart.defaults.font.weight = 400;
Chart.defaults.color = '#757575';

function beOffset(d) {
  const year = d.getFullYear();
  let s = new Date(year, 2, 31);
  while (s.getDay() !== 0) s.setDate(s.getDate() - 1);
  let e = new Date(year, 9, 31);
  while (e.getDay() !== 0) e.setDate(e.getDate() - 1);
  const m = new Date(d);
  return m >= s && m < e ? 2 : 1;
}

function pad(n) { return String(n).padStart(2, '0'); }
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function isWeekend(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.getDay() === 0 || d.getDay() === 6;
}

function badge(p) {
  if (p < 0) return '<span class="badge badge-neg">Negative</span>';
  if (p < 20) return '<span class="badge badge-low">Low</span>';
  return '<span class="badge badge-ok">Normal</span>';
}

/* ── Daily view ── */
async function loadData(dateObj) {
  const dateStr = fmtDate(dateObj);
  document.getElementById('date-label').textContent = dateStr;
  document.getElementById('content').innerHTML = '<div class="loading">Loading prices...</div>';
  document.getElementById('retrieved').textContent = '';

  const url = `https://griddata.elia.be/eliabecontrols.prod/interface/Interconnections/daily/auctionresultsqh/${dateStr}`;

  let data;
  try {
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    data = await resp.json();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="error">Failed to fetch data from Elia API.</div>';
    return;
  }

  const slots = data.filter(s => s.isVisible !== false);
  if (!slots.length) {
    document.getElementById('content').innerHTML = '<div class="error">No data available yet for this date. Day-ahead prices are typically published between 13:00 and 15:00.</div>';
    return;
  }

  const offset = beOffset(dateObj);
  const qp = [];
  for (const s of slots) {
    const dt = new Date(s.dateTime);
    const local = new Date(dt.getTime() + offset * 3600000);
    const dLocal = new Date(local.getUTCFullYear(), local.getUTCMonth(), local.getUTCDate());
    if (dLocal.getFullYear() === dateObj.getFullYear() &&
        dLocal.getMonth() === dateObj.getMonth() &&
        dLocal.getDate() === dateObj.getDate()) {
      qp.push({
        label: pad(local.getUTCHours()) + ':' + pad(local.getUTCMinutes()),
        hour: local.getUTCHours(),
        minute: local.getUTCMinutes(),
        price: Math.round(parseFloat(s.price) * 100) / 100
      });
    }
  }

  if (!qp.length) {
    document.getElementById('content').innerHTML = '<div class="error">No slots found for this delivery date.</div>';
    return;
  }

  const prices = qp.map(p => p.price);
  const mn = Math.min(...prices);
  const mx = Math.max(...prices);
  const av = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length * 100) / 100;
  const neg = qp.filter(p => p.price < 0);
  const negCount = neg.length;

  const runs = [];
  let i = 0;
  while (i < qp.length) {
    if (qp[i].price < 0) {
      let j = i;
      while (j < qp.length && qp[j].price < 0) j++;
      runs.push(qp.slice(i, j));
      i = j;
    } else i++;
  }
  const hrRuns = runs.filter(r => r.length >= 4);

  const hourly = {};
  for (const p of qp) {
    if (!hourly[p.hour]) hourly[p.hour] = [];
    hourly[p.hour].push(p.price);
  }
  const deepNegHours = [];
  for (const h of Object.keys(hourly).map(Number).sort((a, b) => a - b)) {
    if (hourly[h].length === 4) {
      const havg = Math.round(hourly[h].reduce((a, b) => a + b, 0) / 4 * 100) / 100;
      if (havg <= -10) {
        const label = h < 23 ? `${pad(h)}:00-${pad(h+1)}:00` : '23:00-00:00';
        deepNegHours.push({ hour: h, label, avg: havg, prices: hourly[h] });
      }
    }
  }

  let alertHtml;
  if (negCount > 0) {
    const chips = neg.map(p => `<span class="chip">${p.label}: ${p.price.toFixed(2)} EUR</span>`).join(' ');
    alertHtml = `<div class="alert-banner alert-neg"><div class="alert-title neg">ALERT: ${negCount} negative slot(s)</div><div class="neg-chips">${chips}</div><div class="implications">Negative prices = generators pay consumers. Schedule high-consumption activities during these windows.</div></div>`;
  } else {
    alertHtml = '<div class="alert-banner alert-ok"><div class="alert-title ok">All prices positive</div></div>';
  }

  let hrBanner = '';
  if (hrRuns.length) {
    const details = hrRuns.map((r, i) => {
      const deepest = Math.min(...r.map(s => s.price));
      return `<div style="margin-bottom:8px"><strong>Run ${i+1}:</strong> ${r[0].label}–${r[r.length-1].label} (${r.length*15}min) | Deepest: ${deepest.toFixed(2)} EUR/MWh</div>`;
    }).join('');
    hrBanner = `<div class="card" style="background:var(--warning-bg);border-color:#faebcc"><div class="card-title" style="color:var(--warning-text)">Sustained negative runs (≥1h)</div>${details}</div>`;
  }

  let deepBanner = '';
  if (deepNegHours.length) {
    const details = deepNegHours.map(d =>
      `<div style="margin-bottom:8px"><strong>${d.label}</strong> | Avg: ${d.avg.toFixed(2)} EUR/MWh | Slots: ${d.prices.map(p => p.toFixed(2)).join(', ')}</div>`
    ).join('');
    deepBanner = `<div class="card" style="background:var(--danger-bg);border-color:#ebccd1"><div class="card-title" style="color:var(--danger-text)">Full hours with avg ≤ -10 EUR/MWh</div>${details}</div>`;
  }

  const rows = qp.map(p => {
    const cls = p.price < 0 ? ' class="neg-row"' : '';
    return `<tr${cls}><td>${p.label}</td><td>${p.price.toFixed(2)}</td><td>${badge(p.price)}</td></tr>`;
  }).join('\n');

  document.getElementById('content').innerHTML = `
    <p class="subtitle">Delivery: ${dateStr} | Belgium (BZN|BE) | 15-min Day-Ahead Market Clearing Prices</p>
    ${deepBanner}
    ${alertHtml}
    <div class="metrics">
      <div class="metric"><div class="metric-label">Min price</div><div class="metric-value ${mn<0?'danger':''}">${mn.toFixed(2)} EUR</div></div>
      <div class="metric"><div class="metric-label">Max price</div><div class="metric-value">${mx.toFixed(2)} EUR</div></div>
      <div class="metric"><div class="metric-label">Avg price</div><div class="metric-value">${av.toFixed(2)} EUR</div></div>
      <div class="metric"><div class="metric-label">Negative slots</div><div class="metric-value ${negCount>0?'danger':''}">${negCount}</div></div>
      <div class="metric"><div class="metric-label">≥1h negative runs</div><div class="metric-value ${hrRuns.length>0?'danger':''}">${hrRuns.length}</div></div>
      <div class="metric"><div class="metric-label">Hours avg ≤ -10</div><div class="metric-value ${deepNegHours.length>0?'danger':''}">${deepNegHours.length}</div></div>
    </div>
    ${hrBanner}
    <div class="card">
      <div class="card-title">15-min price profile (EUR/MWh)</div>
      <div class="legend">
        <span><span class="legend-dot" style="background:${C.green}"></span>Normal</span>
        <span><span class="legend-dot" style="background:${C.yellow}"></span>Low (&lt;20)</span>
        <span><span class="legend-dot" style="background:${C.red}"></span>Negative</span>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Full 15-min schedule (96 slots)</div>
      <table><thead><tr><th>Slot</th><th>Price (EUR/MWh)</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
  `;

  document.getElementById('retrieved').textContent = 'Retrieved: ' + new Date().toISOString().replace(/\.\d+Z/, 'Z');

  if (chart) { chart.destroy(); chart = null; }
  if (ytdChart) { ytdChart.destroy(); ytdChart = null; }
  const labels = qp.map(p => p.label);
  const vals = qp.map(p => p.price);
  const colors = vals.map(v => v < 0 ? C.red : v < 20 ? C.yellow : C.green);
  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderRadius: 3, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#212121', titleFont: { weight: 700 }, bodyFont: { weight: 400 },
          callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + ' EUR/MWh' }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 24, callback: (v, i) => i % 4 === 0 ? labels[i] : '' } },
        y: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { callback: v => v.toFixed(0) + ' €' } }
      }
    }
  });
}

/* ── YTD view ── */
let ytdCache = null;

async function fetchDay(dateStr) {
  const url = `https://griddata.elia.be/eliabecontrols.prod/interface/Interconnections/daily/auctionresultsqh/${dateStr}`;
  try {
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    return await resp.json();
  } catch { return []; }
}

function processDayForYTD(dateObj, data) {
  const slots = data.filter(s => s.isVisible !== false);
  if (!slots.length) return [];

  const offset = beOffset(dateObj);
  const hourly = {};
  for (const s of slots) {
    const dt = new Date(s.dateTime);
    const local = new Date(dt.getTime() + offset * 3600000);
    const dLocal = new Date(local.getUTCFullYear(), local.getUTCMonth(), local.getUTCDate());
    if (dLocal.getFullYear() === dateObj.getFullYear() &&
        dLocal.getMonth() === dateObj.getMonth() &&
        dLocal.getDate() === dateObj.getDate()) {
      const h = local.getUTCHours();
      if (!hourly[h]) hourly[h] = [];
      hourly[h].push(Math.round(parseFloat(s.price) * 100) / 100);
    }
  }

  const result = [];
  for (const h of Object.keys(hourly).map(Number).sort((a, b) => a - b)) {
    if (hourly[h].length === 4) {
      const avg = Math.round(hourly[h].reduce((a, b) => a + b, 0) / 4 * 100) / 100;
      if (avg <= -10) {
        const label = h < 23 ? `${pad(h)}:00-${pad(h+1)}:00` : '23:00-00:00';
        result.push({ date: fmtDate(dateObj), hour: h, label, avg, prices: hourly[h] });
      }
    }
  }
  return result;
}

async function scanYear(year, endDate, progressCb) {
  const start = new Date(year, 0, 1);
  const end = new Date(endDate);
  const days = [];
  const d = new Date(start);
  while (d <= end) {
    days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  const allHours = [];
  let done = 0;
  const batchSize = 10;
  for (let i = 0; i < days.length; i += batchSize) {
    const batch = days.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(async (day) => {
      const data = await fetchDay(fmtDate(day));
      return processDayForYTD(day, data);
    }));
    for (const r of results) allHours.push(...r);
    done += batch.length;
    if (progressCb) progressCb(done, days.length, allHours.length);
  }
  return allHours;
}

async function loadYTD() {
  document.getElementById('date-label').textContent = '';
  if (chart) { chart.destroy(); chart = null; }
  if (ytdChart) { ytdChart.destroy(); ytdChart = null; }

  if (ytdCache) {
    renderYTD(ytdCache.current, ytdCache.prev);
    return;
  }

  const today = new Date();
  const year = today.getFullYear();
  const prevYear = year - 1;
  const prevEndDate = new Date(prevYear, today.getMonth(), today.getDate() + 1);

  const totalCurrentDays = Math.ceil((new Date(today.getTime() + 86400000) - new Date(year, 0, 1)) / 86400000);
  const totalPrevDays = Math.ceil((prevEndDate - new Date(prevYear, 0, 1)) / 86400000);
  const totalDays = totalCurrentDays + totalPrevDays;

  document.getElementById('content').innerHTML = `
    <p class="subtitle">Scanning ${year} and ${prevYear} (same period) for full hours with avg ≤ -10 EUR/MWh...</p>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="ytd-progress" style="width:0%"></div></div>
    <div id="ytd-progress-text" style="font-size:13px;color:var(--grey-600);text-align:center;margin-top:8px;">0 / ${totalDays} days</div>
  `;

  let globalDone = 0;
  const updateProgress = (found) => {
    const pct = Math.round(globalDone / totalDays * 100);
    const bar = document.getElementById('ytd-progress');
    const txt = document.getElementById('ytd-progress-text');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = `${globalDone} / ${totalDays} days (${found} negative hours found)`;
  };

  const prevHours = await scanYear(prevYear, prevEndDate, (done, total, found) => {
    globalDone = done;
    updateProgress(found);
  });

  const prevDone = globalDone;
  const currentEnd = new Date(today);
  currentEnd.setDate(currentEnd.getDate() + 1);
  const currentHours = await scanYear(year, currentEnd, (done, total, found) => {
    globalDone = prevDone + done;
    updateProgress(prevHours.length + found);
  });

  ytdCache = { current: currentHours, prev: prevHours };
  renderYTD(currentHours, prevHours);
}

function renderYTD(allHours, prevYearHours) {
  const year = new Date().getFullYear();
  const prevYear = year - 1;
  const totalHours = allHours.length;
  const prevTotalHours = prevYearHours ? prevYearHours.length : 0;
  const deepest = totalHours > 0 ? Math.min(...allHours.map(h => h.avg)) : 0;

  const byDate = {};
  for (const h of allHours) {
    if (!byDate[h.date]) byDate[h.date] = [];
    byDate[h.date].push(h);
  }
  const daysAffected = Object.keys(byDate).length;
  const sortedDates = Object.keys(byDate).sort();

  const prevByDate = {};
  if (prevYearHours) {
    for (const h of prevYearHours) {
      if (!prevByDate[h.date]) prevByDate[h.date] = [];
      prevByDate[h.date].push(h);
    }
  }

  /* ── Weekend vs weekday analysis ── */
  const wkendCur = allHours.filter(h => isWeekend(h.date));
  const wkdayCur = allHours.filter(h => !isWeekend(h.date));
  const wkendPrev = prevYearHours ? prevYearHours.filter(h => isWeekend(h.date)) : [];
  const wkdayPrev = prevYearHours ? prevYearHours.filter(h => !isWeekend(h.date)) : [];

  const today = new Date();
  function countDayTypes(yr, endDate) {
    let wkend = 0, wkday = 0;
    const d = new Date(yr, 0, 1);
    const end = new Date(endDate);
    while (d <= end) {
      const dow = d.getDay();
      if (dow === 0 || dow === 6) wkend++; else wkday++;
      d.setDate(d.getDate() + 1);
    }
    return { wkend, wkday };
  }
  const curCounts = countDayTypes(year, today);
  const prevEndDate = new Date(prevYear, today.getMonth(), today.getDate());
  const prevCounts = countDayTypes(prevYear, prevEndDate);

  const curWkendRate = curCounts.wkend > 0 ? (wkendCur.length / curCounts.wkend).toFixed(2) : '0';
  const curWkdayRate = curCounts.wkday > 0 ? (wkdayCur.length / curCounts.wkday).toFixed(2) : '0';
  const prevWkendRate = prevCounts.wkend > 0 ? (wkendPrev.length / prevCounts.wkend).toFixed(2) : '0';
  const prevWkdayRate = prevCounts.wkday > 0 ? (wkdayPrev.length / prevCounts.wkday).toFixed(2) : '0';

  const curWkendDays = new Set(wkendCur.map(h => h.date)).size;
  const curWkdayDays = new Set(wkdayCur.map(h => h.date)).size;
  const prevWkendDays = new Set(wkendPrev.map(h => h.date)).size;
  const prevWkdayDays = new Set(wkdayPrev.map(h => h.date)).size;

  function pctBar(weekend, weekday) {
    const total = weekend + weekday;
    if (total === 0) return '<div style="font-size:12px;color:var(--grey-500)">No negative hours</div>';
    const wePct = Math.round(weekend / total * 100);
    const wdPct = 100 - wePct;
    return `<div class="wk-bar-wrap">
      <span class="wk-bar-label">${wePct}% wknd</span>
      <div style="flex:1;display:flex;height:8px;border-radius:4px;overflow:hidden">
        <div style="width:${wePct}%;background:${C.purple}"></div>
        <div style="width:${wdPct}%;background:${C.red}"></div>
      </div>
      <span class="wk-bar-label">${wdPct}% wkday</span>
    </div>`;
  }

  const weekendTileHtml = `
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">Weekend vs Weekday — negative hours (avg ≤ -10 EUR/MWh)</div>
      <div class="wk-compare">
        <div class="wk-compare-col">
          <h4>${year}</h4>
          <div class="wk-row"><span class="wk-label">Weekend hours</span><span class="wk-val danger">${wkendCur.length}</span></div>
          <div class="wk-row"><span class="wk-label">Weekday hours</span><span class="wk-val danger">${wkdayCur.length}</span></div>
          <div class="wk-row"><span class="wk-label">Weekend days affected</span><span class="wk-val">${curWkendDays} / ${curCounts.wkend}</span></div>
          <div class="wk-row"><span class="wk-label">Weekday days affected</span><span class="wk-val">${curWkdayDays} / ${curCounts.wkday}</span></div>
          <div class="wk-row"><span class="wk-label">Neg. hours / weekend day</span><span class="wk-val">${curWkendRate}</span></div>
          <div class="wk-row"><span class="wk-label">Neg. hours / weekday</span><span class="wk-val">${curWkdayRate}</span></div>
          ${pctBar(wkendCur.length, wkdayCur.length)}
        </div>
        <div class="wk-compare-col">
          <h4>${prevYear} <span style="font-weight:400;font-size:12px;color:var(--grey-600)">(same period)</span></h4>
          <div class="wk-row"><span class="wk-label">Weekend hours</span><span class="wk-val danger">${wkendPrev.length}</span></div>
          <div class="wk-row"><span class="wk-label">Weekday hours</span><span class="wk-val danger">${wkdayPrev.length}</span></div>
          <div class="wk-row"><span class="wk-label">Weekend days affected</span><span class="wk-val">${prevWkendDays} / ${prevCounts.wkend}</span></div>
          <div class="wk-row"><span class="wk-label">Weekday days affected</span><span class="wk-val">${prevWkdayDays} / ${prevCounts.wkday}</span></div>
          <div class="wk-row"><span class="wk-label">Neg. hours / weekend day</span><span class="wk-val">${prevWkendRate}</span></div>
          <div class="wk-row"><span class="wk-label">Neg. hours / weekday</span><span class="wk-val">${prevWkdayRate}</span></div>
          ${pctBar(wkendPrev.length, wkdayPrev.length)}
        </div>
      </div>
    </div>
  `;

  /* ── Monthly aggregation ── */
  const byMonth = {};
  for (const h of allHours) {
    const m = h.date.slice(5, 7);
    if (!byMonth[m]) byMonth[m] = 0;
    byMonth[m]++;
  }
  const prevByMonth = {};
  if (prevYearHours) {
    for (const h of prevYearHours) {
      const m = h.date.slice(5, 7);
      if (!prevByMonth[m]) prevByMonth[m] = 0;
      prevByMonth[m]++;
    }
  }

  const diff = totalHours - prevTotalHours;
  const diffLabel = diff > 0 ? `+${diff} vs ${prevYear}` : diff < 0 ? `${diff} vs ${prevYear}` : `same as ${prevYear}`;
  const diffColor = diff > 0 ? 'danger' : '';

  let metricsHtml = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total hours ≤ -10 (${year})</div><div class="metric-value danger">${totalHours}</div></div>
      <div class="metric"><div class="metric-label">Same period ${prevYear}</div><div class="metric-value">${prevTotalHours}</div></div>
      <div class="metric"><div class="metric-label">Deepest hour avg</div><div class="metric-value danger">${deepest.toFixed(0)} EUR</div></div>
      <div class="metric"><div class="metric-label">YoY change</div><div class="metric-value ${diffColor}">${diffLabel}</div></div>
    </div>
  `;

  const monthLabels = [];
  const monthValues = [];
  const prevMonthValues = [];
  for (let m = 0; m < 12; m++) {
    const mm = pad(m + 1);
    const name = new Date(year, m, 1).toLocaleString('en', { month: 'short' });
    monthLabels.push(name);
    monthValues.push(byMonth[mm] || 0);
    prevMonthValues.push(prevByMonth[mm] || 0);
  }

  let tableRows = '';
  for (const dt of sortedDates) {
    const entries = byDate[dt];
    const dayDeepest = Math.min(...entries.map(e => e.avg));
    const dayName = new Date(dt + 'T12:00:00').toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
    const isWe = isWeekend(dt);
    const weTag = isWe ? ` <span style="font-size:11px;color:${C.purple};font-weight:700">WE</span>` : '';
    const rowStyle = isWe ? ` style="background:rgba(31,16,109,0.03)"` : '';
    tableRows += `<tr class="ytd-day-row" data-date="${dt}"${rowStyle}>
      <td>${dt}</td>
      <td>${dayName}${weTag}</td>
      <td style="font-weight:700">${entries.length}</td>
      <td style="font-weight:700;color:var(--engie-red)">${dayDeepest.toFixed(2)}</td>
      <td>${entries.map(e => e.label).join(', ')}</td>
    </tr>`;
    for (const e of entries) {
      tableRows += `<tr class="ytd-detail" data-parent="${dt}">
        <td></td>
        <td></td>
        <td>${e.label}</td>
        <td>${e.avg.toFixed(2)} EUR/MWh</td>
        <td>Slots: ${e.prices.map(p => p.toFixed(2)).join(', ')}</td>
      </tr>`;
    }
  }

  document.getElementById('content').innerHTML = `
    <p class="subtitle">Year-to-date ${year} | Full hours with average ≤ -10 EUR/MWh</p>
    ${metricsHtml}
    ${weekendTileHtml}
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button id="ytd-back-btn" style="display:none;background:#fff;border:1px solid var(--grey-300);border-radius:var(--radius-sm);padding:5px 12px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;color:var(--engie-blue)" onclick="renderMonthlyChart()">← All months</button>
        <div class="card-title" id="ytd-chart-title" style="margin-bottom:0">Negative hours by month <span style="font-weight:400;color:var(--grey-600)">— click a bar to drill down</span></div>
      </div>
      <div class="legend" id="ytd-chart-legend">
        <span><span class="legend-dot" style="background:${C.red}"></span>${year}</span>
        <span><span class="legend-dot" style="background:${C.lightBlue}"></span>${prevYear} (same period)</span>
      </div>
      <div class="chart-wrap"><canvas id="ytd-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title" id="ytd-table-title">Daily breakdown ${year} (click a row to expand)</div>
      <table>
        <thead><tr><th>Date</th><th>Day</th><th>Hours</th><th>Deepest avg</th><th>Time slots</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;

  document.getElementById('retrieved').textContent = 'Scanned: ' + new Date().toISOString().replace(/\.\d+Z/, 'Z');

  const monthKeys = [];
  for (let m = 0; m < 12; m++) monthKeys.push(pad(m + 1));

  window._ytdByDate = byDate;
  window._ytdPrevByDate = prevByDate;
  window._ytdMonthLabels = monthLabels;
  window._ytdMonthValues = monthValues;
  window._ytdPrevMonthValues = prevMonthValues;
  window._ytdMonthKeys = monthKeys;
  window._ytdYear = year;
  window._ytdPrevYear = prevYear;

  renderMonthlyChart();

  document.querySelectorAll('.ytd-day-row').forEach(row => {
    row.addEventListener('click', () => {
      const dt = row.dataset.date;
      document.querySelectorAll(`.ytd-detail[data-parent="${dt}"]`).forEach(r => {
        r.style.display = r.style.display === 'table-row' ? 'none' : 'table-row';
      });
    });
  });
}

/* ── Chart drill-down ── */
window.renderMonthlyChart = function() {
  if (ytdChart) { ytdChart.destroy(); ytdChart = null; }
  const monthLabels = window._ytdMonthLabels;
  const monthValues = window._ytdMonthValues;
  const prevMonthValues = window._ytdPrevMonthValues;
  const monthKeys = window._ytdMonthKeys;
  const year = window._ytdYear;
  const prevYear = window._ytdPrevYear;

  document.getElementById('ytd-back-btn').style.display = 'none';
  document.getElementById('ytd-chart-title').innerHTML = `Negative hours by month <span style="font-weight:400;color:var(--grey-600)">— click a bar to drill down</span>`;
  document.getElementById('ytd-chart-legend').innerHTML = `
    <span><span class="legend-dot" style="background:${C.red}"></span>${year}</span>
    <span><span class="legend-dot" style="background:${C.lightBlue}"></span>${prevYear} (same period)</span>
  `;

  const cfg = {
    type: 'bar',
    data: {
      labels: monthLabels,
      datasets: [
        { label: String(year), data: monthValues, backgroundColor: C.red, borderRadius: 4, barPercentage: 0.8, categoryPercentage: 0.6 },
        { label: String(prevYear), data: prevMonthValues, backgroundColor: C.lightBlue, borderRadius: 4, barPercentage: 0.8, categoryPercentage: 0.6 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const idx = elements[0].index;
        if (monthValues[idx] === 0 && prevMonthValues[idx] === 0) return;
        drillDownMonth(monthKeys[idx], monthLabels[idx]);
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#212121', titleFont: { weight: 700 },
          callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' hour(s)' }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { autoSkip: false, font: { weight: 700 } } },
        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { stepSize: 1, callback: v => Number.isInteger(v) ? v : '' }, title: { display: true, text: 'Full hours', font: { weight: 700 } } }
      }
    }
  };
  cfg._weekendFlags = null;
  ytdChart = new Chart(document.getElementById('ytd-chart'), cfg);
};

function drillDownMonth(monthKey, monthName) {
  if (ytdChart) { ytdChart.destroy(); ytdChart = null; }
  const year = window._ytdYear;
  const prevYear = window._ytdPrevYear;
  const byDate = window._ytdByDate;
  const prevByDate = window._ytdPrevByDate;

  const m = parseInt(monthKey, 10) - 1;
  const daysInMonth = Math.max(new Date(year, m + 1, 0).getDate(), new Date(prevYear, m + 1, 0).getDate());

  const dayLabels = [];
  const dayValues = [];
  const prevDayValues = [];
  const dayDeepest = [];
  const prevDayDeepest = [];
  const weekendFlags = [];

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${monthKey}-${pad(d)}`;
    const prevKey = `${prevYear}-${monthKey}-${pad(d)}`;
    dayLabels.push(d);
    const entries = byDate[key] || [];
    const prevEntries = prevByDate[prevKey] || [];
    dayValues.push(entries.length);
    prevDayValues.push(prevEntries.length);
    dayDeepest.push(entries.length > 0 ? Math.min(...entries.map(e => e.avg)).toFixed(1) : null);
    prevDayDeepest.push(prevEntries.length > 0 ? Math.min(...prevEntries.map(e => e.avg)).toFixed(1) : null);

    const dateObj = new Date(year, m, d);
    const dow = dateObj.getDay();
    weekendFlags.push(dow === 0 || dow === 6);
  }

  document.getElementById('ytd-back-btn').style.display = '';
  document.getElementById('ytd-chart-title').innerHTML = `${monthName} — negative hours per day`;
  document.getElementById('ytd-chart-legend').innerHTML = `
    <span><span class="legend-dot" style="background:${C.red}"></span>${year}</span>
    <span><span class="legend-dot" style="background:${C.lightBlue}"></span>${prevYear}</span>
    <span><span class="legend-stripe"></span>Weekend</span>
  `;

  const cfg = {
    type: 'bar',
    data: {
      labels: dayLabels,
      datasets: [
        { label: String(year), data: dayValues, backgroundColor: C.red, borderRadius: 3, barPercentage: 0.8, categoryPercentage: 0.7 },
        { label: String(prevYear), data: prevDayValues, backgroundColor: C.lightBlue, borderRadius: 3, barPercentage: 0.8, categoryPercentage: 0.7 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#212121', titleFont: { weight: 700 },
          callbacks: {
            title: ctx => {
              const idx = ctx[0].dataIndex;
              const we = weekendFlags[idx] ? ' (weekend)' : '';
              return `${monthName} ${ctx[0].label}${we}`;
            },
            label: ctx => {
              const v = ctx.parsed.y;
              const isCurrentYear = ctx.datasetIndex === 0;
              const yr = isCurrentYear ? year : prevYear;
              if (v === 0) return `${yr}: no negative hours`;
              const deep = isCurrentYear ? dayDeepest[ctx.dataIndex] : prevDayDeepest[ctx.dataIndex];
              return `${yr}: ${v} hour(s) | deepest avg: ${deep} EUR/MWh`;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { autoSkip: false, callback: (v, i) => {
          const lbl = dayLabels[i];
          const suffix = weekendFlags[i] ? '*' : '';
          return (lbl % 5 === 1 || lbl === 1) ? lbl + suffix : (weekendFlags[i] ? lbl + '*' : '');
        }, font: (ctx) => ({ size: 10, weight: weekendFlags[ctx.index] ? '900' : '400' }) }, title: { display: true, text: 'Day of month (* = weekend)', font: { weight: 700 } } },
        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { stepSize: 1, callback: v => Number.isInteger(v) ? v : '' }, title: { display: true, text: 'Full hours', font: { weight: 700 } } }
      }
    }
  };
  cfg._weekendFlags = weekendFlags;
  ytdChart = new Chart(document.getElementById('ytd-chart'), cfg);
}

/* ── Navigation ── */
const today = new Date();
const tomorrow = new Date(today);
tomorrow.setDate(tomorrow.getDate() + 1);

const btnToday = document.getElementById('btn-today');
const btnTomorrow = document.getElementById('btn-tomorrow');
const btnYtd = document.getElementById('btn-ytd');

function setActive(btn) {
  [btnToday, btnTomorrow, btnYtd].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

btnToday.addEventListener('click', () => { setActive(btnToday); loadData(today); });
btnTomorrow.addEventListener('click', () => { setActive(btnTomorrow); loadData(tomorrow); });
btnYtd.addEventListener('click', () => { setActive(btnYtd); loadYTD(); });

btnTomorrow.classList.add('active');
loadData(tomorrow);
</script>
</body>
</html>
