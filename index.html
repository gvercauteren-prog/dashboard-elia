<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Day-Ahead Price Monitor | Belgian Electricity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --engie-blue:#0079cc;
  --engie-blue-hover:#005a97;
  --engie-blue-dark:#003f6a;
  --engie-teal:#23d2b5;
  --engie-gradient:linear-gradient(132deg,#0079cc -30%,#23d2b5 133%);
  --engie-gradient-text:linear-gradient(132deg,#0079cc 0%,#23d2b5 100%);
  --engie-purple:#1f106d;
  --engie-red:#e74a50;
  --engie-orange:#d04800;
  --engie-yellow:#fbdb3c;
  --engie-green:#6ed2b1;
  --engie-green-fun:#4b9726;
  --grey-900:#212121;
  --grey-800:#424242;
  --grey-700:#616161;
  --grey-600:#757575;
  --grey-500:#9e9e9e;
  --grey-400:#bdbdbd;
  --grey-300:#e0e0e0;
  --grey-200:#eee;
  --grey-100:#f5f5f5;
  --danger-text:#a94442;
  --danger-bg:#f2dede;
  --success-text:#3c763d;
  --success-bg:#dff0d8;
  --warning-text:#8a6d3b;
  --warning-bg:#fcf8e3;
  --radius:8px;
  --radius-sm:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',Arial,sans-serif;background:#fff;color:var(--grey-900);font-weight:400;font-size:14px;line-height:1.6}

/* ── ENGIE gradient text (like Happy Hours headings) ── */
.text-gradient{
  background:var(--engie-gradient-text);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ── Hero section (inspired by header-product) ── */
.hero{
  background:linear-gradient(135deg,#005288 0%,#0079cc 40%,#23d2b5 100%);
  padding:48px 24px 44px;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-60%;right:-20%;width:80%;height:200%;
  background:radial-gradient(ellipse,rgba(35,210,181,.2) 0%,transparent 70%);
  pointer-events:none;
}
.hero .container{max-width:1040px;margin:0 auto;position:relative;z-index:1}
.hero-brand{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.hero-logo{
  font-size:22px;font-weight:900;letter-spacing:1px;text-transform:uppercase;
  background:rgba(255,255,255,.15);padding:6px 14px;border-radius:6px;
}
.hero-logo span{font-weight:300;opacity:.8}
.hero h1{font-size:28px;font-weight:900;margin:0 0 6px;letter-spacing:-.3px}
.hero p{font-size:15px;font-weight:300;opacity:.9;margin:0;max-width:600px}

/* ── Container ── */
.container{max-width:1040px;margin:0 auto;padding:0 24px}

/* ── Alternating sections (ENGIE pattern) ── */
.section{padding:28px 0}
.section--grey{background:var(--grey-100)}
.section--white{background:#fff}

/* ── Navigation pills ── */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:0;flex-wrap:wrap}
.date-nav button{
  background:#fff;border:1.5px solid var(--grey-300);border-radius:24px;
  padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  color:var(--grey-700);transition:all .2s
}
.date-nav button:hover{border-color:var(--engie-blue);color:var(--engie-blue);background:#f0f9ff}
.date-nav button.active{
  background:var(--engie-blue);color:#fff;border-color:var(--engie-blue);
  box-shadow:0 2px 8px rgba(0,121,204,.25)
}
.date-nav span{font-size:14px;font-weight:700;color:var(--grey-600)}

/* ── Section headings (gradient text like Happy Hours) ── */
.section-title{font-size:22px;font-weight:700;margin-bottom:20px}

/* ── Subtitle ── */
.subtitle{font-size:13px;color:var(--grey-600);margin-bottom:24px;font-weight:400}

/* ── Alert banners ── */
.alert-banner{padding:16px 20px;border-radius:var(--radius);margin-bottom:20px;border:1px solid;display:flex;align-items:flex-start;gap:14px}
.alert-icon{font-size:24px;line-height:1;flex-shrink:0;margin-top:2px}
.alert-body{flex:1}
.alert-neg{background:var(--danger-bg);border-color:#ebccd1}
.alert-ok{background:var(--success-bg);border-color:#d6e9c6}
.alert-title{font-size:15px;font-weight:700;margin-bottom:4px}
.alert-title.neg{color:var(--danger-text)}
.alert-title.ok{color:var(--success-text)}
.neg-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.chip{background:#fff;border:1px solid #ebccd1;border-radius:20px;padding:3px 12px;font-size:13px;color:var(--danger-text);font-weight:700}
.implications{font-size:13px;color:var(--grey-600)}

/* ── USP-style metric tiles ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.metric{
  background:#fff;border-radius:var(--radius);padding:20px 18px;
  border:1px solid var(--grey-200);text-align:center;
  transition:transform .2s,box-shadow .2s
}
.metric:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.metric-icon{font-size:28px;margin-bottom:8px;display:block}
.metric-value{font-size:28px;font-weight:900;color:var(--grey-900);display:block;line-height:1.2}
.metric-value.danger{color:var(--engie-red)}
.metric-value.positive{color:var(--engie-green-fun)}
.metric-label{font-size:11px;color:var(--grey-600);margin-top:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}

/* ── Cards ── */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--grey-200);padding:20px 22px;margin-bottom:20px}
.section--grey .card{border-color:var(--grey-300)}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--grey-900)}

/* ── Legend ── */
.legend{display:flex;gap:16px;margin-bottom:14px;font-size:12px;color:var(--grey-600);align-items:center;flex-wrap:wrap}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.legend-stripe{width:10px;height:10px;display:inline-block;margin-right:5px;background:repeating-linear-gradient(45deg,rgba(31,16,109,.15),rgba(31,16,109,.15) 2px,rgba(31,16,109,.04) 2px,rgba(31,16,109,.04) 4px);border-radius:50%;vertical-align:middle}

/* ── Charts ── */
.chart-wrap{position:relative;width:100%;height:280px}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 8px;font-weight:700;color:var(--grey-600);border-bottom:2px solid var(--grey-300);text-transform:uppercase;font-size:11px;letter-spacing:.4px}
td{padding:8px;border-bottom:1px solid var(--grey-200)}
tr.neg-row{background:var(--danger-bg)}
.badge{font-size:11px;padding:2px 10px;border-radius:20px;border:1px solid;font-weight:700}
.badge-neg{background:var(--danger-bg);color:var(--danger-text);border-color:#ebccd1}
.badge-low{background:var(--warning-bg);color:var(--warning-text);border-color:#faebcc}
.badge-ok{background:var(--success-bg);color:var(--success-text);border-color:#d6e9c6}

/* ── Footer ── */
.footer-section{background:var(--grey-900);color:var(--grey-400);padding:20px 0}
.footer-inner{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;align-items:center}
.footer-inner a{color:var(--engie-teal);text-decoration:none}

/* ── Loading / Error ── */
.loading{text-align:center;padding:60px 20px;color:var(--grey-600);font-size:15px;font-weight:300}
.error{text-align:center;padding:60px 20px;color:var(--danger-text);font-size:15px}

/* ── Progress bar ── */
.progress-bar-outer{width:100%;height:6px;background:var(--grey-300);border-radius:3px;margin:14px 0}
.progress-bar-inner{height:100%;background:var(--engie-gradient);border-radius:3px;transition:width .2s}

/* ── YTD table rows ── */
.ytd-day-row{cursor:pointer;transition:background .1s}
.ytd-day-row:hover{background:var(--grey-100)}
.ytd-detail{display:none;background:#fafafa}
.ytd-detail td{padding-left:28px;color:var(--grey-600);font-size:12px}
.imb-loading{color:var(--grey-400);font-size:12px;animation:imbPulse 1s infinite}
@keyframes imbPulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ── Weekend vs Weekday tile ── */
.wk-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.wk-compare-col{background:var(--grey-100);border-radius:var(--radius);padding:18px;border:1px solid var(--grey-200)}
.section--grey .wk-compare-col{background:#fff}
.wk-compare-col h4{font-size:16px;font-weight:900;margin-bottom:14px}
.wk-compare-col h4 .text-gradient{font-size:16px;font-weight:900}
.wk-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--grey-200);font-size:13px}
.wk-row:last-child{border-bottom:none}
.wk-label{color:var(--grey-600)}
.wk-val{font-weight:700}
.wk-val.danger{color:var(--engie-red)}
.wk-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:12px}
.wk-bar-label{font-size:11px;color:var(--grey-600);white-space:nowrap;font-weight:700}

/* ── Back button (orange CTA style like Happy Hours) ── */
.btn-back{
  display:none;background:var(--engie-orange);color:#fff;
  border:none;border-radius:24px;padding:7px 18px;
  font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;
  transition:background .15s
}
.btn-back:hover{background:#b83e00}

/* ── Scroll-in animations ── */
.fade-in{opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* ── Responsive ── */
@media(max-width:640px){
  .wk-compare{grid-template-columns:1fr}
  .hero h1{font-size:22px}
  .hero{padding:32px 16px 28px}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .section{padding:20px 0}
}
</style>
</head>
<body>

<!-- ─── Hero (ENGIE header-product style) ─── -->
<div class="hero">
  <div class="container">
    <div class="hero-brand">
      <div class="hero-logo">ENGIE <span>energy</span></div>
    </div>
    <h1>Day-Ahead Price Monitor</h1>
    <p>Belgian electricity market clearing prices &mdash; BZN|BE via Elia / EPEX SPOT</p>
  </div>
</div>

<!-- ─── Navigation section ─── -->
<div class="section section--white">
  <div class="container">
    <div class="date-nav">
      <button id="btn-today">Today</button>
      <button id="btn-tomorrow">Tomorrow</button>
      <button id="btn-ytd">YTD Negative Hours</button>
      <span id="date-label"></span>
    </div>
  </div>
</div>

<!-- ─── Main content ─── -->
<div id="content"><div class="section section--grey"><div class="container"><div class="loading">Loading prices...</div></div></div></div>

<!-- ─── Footer ─── -->
<div class="footer-section">
  <div class="container">
    <div class="footer-inner">
      <span>Source: <a href="https://griddata.elia.be" target="_blank">griddata.elia.be</a> &mdash; BZN|BE Day-Ahead (EPEX SPOT via Elia)</span>
      <span id="retrieved"></span>
    </div>
  </div>
</div>

<script>
let chart = null;
let ytdChart = null;

/* ── ENGIE color palette ── */
const C = {
  green: '#6ed2b1',
  yellow: '#fbdb3c',
  red: '#e74a50',
  blue: '#0079cc',
  teal: '#23d2b5',
  purple: '#1f106d',
  lightBlue: '#85B7EB',
  orange: '#d04800',
};

/* ── Weekend background plugin ── */
const weekendBgPlugin = {
  id: 'weekendBg',
  beforeDraw(chart) {
    const meta = chart.config._weekendFlags;
    if (!meta) return;
    const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
    ctx.save();
    ctx.fillStyle = 'rgba(31, 16, 109, 0.05)';
    for (let i = 0; i < meta.length; i++) {
      if (!meta[i]) continue;
      const xCenter = x.getPixelForValue(i);
      const barWidth = x.width / meta.length;
      ctx.fillRect(xCenter - barWidth / 2, top, barWidth, bottom - top);
    }
    ctx.restore();
  }
};
Chart.register(weekendBgPlugin);

Chart.defaults.font.family = "'Lato', Arial, sans-serif";
Chart.defaults.font.weight = 400;
Chart.defaults.color = '#757575';

/* ── Scroll-in observer ── */
const fadeObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); fadeObserver.unobserve(e.target); } });
}, { threshold: 0.15 });

function initFadeIns() {
  document.querySelectorAll('.fade-in').forEach(el => fadeObserver.observe(el));
}

function beOffset(d) {
  const year = d.getFullYear();
  let s = new Date(year, 2, 31);
  while (s.getDay() !== 0) s.setDate(s.getDate() - 1);
  let e = new Date(year, 9, 31);
  while (e.getDay() !== 0) e.setDate(e.getDate() - 1);
  const m = new Date(d);
  return m >= s && m < e ? 2 : 1;
}

function pad(n) { return String(n).padStart(2, '0'); }
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function isWeekend(dateStr) { const d = new Date(dateStr + 'T12:00:00'); return d.getDay() === 0 || d.getDay() === 6; }

function badge(p) {
  if (p < 0) return '<span class="badge badge-neg">Negative</span>';
  if (p < 20) return '<span class="badge badge-low">Low</span>';
  return '<span class="badge badge-ok">Normal</span>';
}

/* ── Flemish public holidays ── */
function easterSunday(year) {
  // Anonymous Gregorian algorithm
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month, day);
}

function getFlemishHolidays(year) {
  const easter = easterSunday(year);
  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
  const fmt = d => fmtDate(d);
  const holidays = {};
  holidays[`${year}-01-01`] = 'New Year';
  holidays[fmt(addDays(easter, 1))] = 'Easter Monday';
  holidays[`${year}-05-01`] = 'Labour Day';
  holidays[fmt(addDays(easter, 39))] = 'Ascension';
  holidays[fmt(addDays(easter, 50))] = 'Whit Monday';
  holidays[`${year}-07-11`] = 'Flemish Day';
  holidays[`${year}-07-21`] = 'National Day';
  holidays[`${year}-08-15`] = 'Assumption';
  holidays[`${year}-11-01`] = 'All Saints';
  holidays[`${year}-11-11`] = 'Armistice';
  holidays[`${year}-12-25`] = 'Christmas';
  return holidays;
}

const HOLIDAYS = { ...getFlemishHolidays(2025), ...getFlemishHolidays(2026) };
function isHoliday(dateStr) { return HOLIDAYS[dateStr] || null; }

/* ── Flemish school holidays ── */
function getSchoolHolidayPeriods() {
  // School year 2024-2025
  // School year 2025-2026
  return [
    { from: '2024-10-28', to: '2024-11-03', name: 'Autumn break' },
    { from: '2024-12-23', to: '2025-01-05', name: 'Christmas break' },
    { from: '2025-03-03', to: '2025-03-09', name: 'Carnival break' },
    { from: '2025-04-07', to: '2025-04-21', name: 'Easter break' },
    { from: '2025-07-01', to: '2025-08-31', name: 'Summer break' },
    { from: '2025-10-27', to: '2025-11-02', name: 'Autumn break' },
    { from: '2025-12-22', to: '2026-01-04', name: 'Christmas break' },
    { from: '2026-02-16', to: '2026-02-22', name: 'Carnival break' },
    { from: '2026-04-06', to: '2026-04-19', name: 'Easter break' },
    { from: '2026-07-01', to: '2026-08-31', name: 'Summer break' },
  ];
}
const SCHOOL_HOLIDAYS = getSchoolHolidayPeriods();
function isSchoolHoliday(dateStr) {
  for (const p of SCHOOL_HOLIDAYS) {
    if (dateStr >= p.from && dateStr <= p.to) return p.name;
  }
  return null;
}

/* ── Imbalance price API (Elia Open Data ods134) ── */
async function fetchImbalanceForDay(dateStr) {
  // ods134: QH imbalance prices from 22/05/2024 onward
  const url = `https://opendata.elia.be/api/explore/v2.1/catalog/datasets/ods134/records?limit=100&order_by=datetime&where=datetime>='${dateStr}T00:00:00' and datetime<'${dateStr}T23:59:59'`;
  try {
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    const data = await resp.json();
    return (data.results || []).map(r => ({
      datetime: r.datetime,
      price: r.imbalanceprice
    }));
  } catch { return []; }
}

async function enrichEventsWithImbalance(allHours, byDate) {
  // For each event day, fetch imbalance prices for the negative hours
  const eventDays = Object.keys(byDate).sort();
  const imbalanceData = {};
  const batchSize = 5;
  for (let i = 0; i < eventDays.length; i += batchSize) {
    const batch = eventDays.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(async (dateStr) => {
      const imbData = await fetchImbalanceForDay(dateStr);
      return { dateStr, imbData };
    }));
    for (const { dateStr, imbData } of results) {
      imbalanceData[dateStr] = imbData;
    }
  }
  return imbalanceData;
}

function getImbalanceForHours(imbDay, hours, offset) {
  // Match imbalance QH records to the negative hours
  if (!imbDay || !imbDay.length) return { prices: [], min: null, avg: null };
  const negHourSet = new Set(hours.map(h => h.hour));
  const matched = [];
  for (const rec of imbDay) {
    const dt = new Date(rec.datetime);
    const local = new Date(dt.getTime() + offset * 3600000);
    const h = local.getUTCHours();
    if (negHourSet.has(h) && rec.price != null) {
      matched.push(rec.price);
    }
  }
  if (!matched.length) return { prices: matched, min: null, avg: null };
  return { prices: matched, min: Math.min(...matched), avg: Math.round(matched.reduce((a,b)=>a+b,0)/matched.length*100)/100 };
}

/* ── Daily view ── */
async function loadData(dateObj) {
  const dateStr = fmtDate(dateObj);
  document.getElementById('date-label').textContent = dateStr;
  document.getElementById('content').innerHTML = '<div class="section section--grey"><div class="container"><div class="loading">Loading prices...</div></div></div>';
  document.getElementById('retrieved').textContent = '';

  const url = `https://griddata.elia.be/eliabecontrols.prod/interface/Interconnections/daily/auctionresultsqh/${dateStr}`;
  let data;
  try {
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    data = await resp.json();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="section section--grey"><div class="container"><div class="error">Failed to fetch data from Elia API.</div></div></div>';
    return;
  }

  const slots = data.filter(s => s.isVisible !== false);
  if (!slots.length) {
    document.getElementById('content').innerHTML = '<div class="section section--grey"><div class="container"><div class="error">No data available yet for this date. Day-ahead prices are typically published between 13:00 and 15:00.</div></div></div>';
    return;
  }

  const offset = beOffset(dateObj);
  const qp = [];
  for (const s of slots) {
    const dt = new Date(s.dateTime);
    const local = new Date(dt.getTime() + offset * 3600000);
    const dLocal = new Date(local.getUTCFullYear(), local.getUTCMonth(), local.getUTCDate());
    if (dLocal.getFullYear() === dateObj.getFullYear() && dLocal.getMonth() === dateObj.getMonth() && dLocal.getDate() === dateObj.getDate()) {
      qp.push({ label: pad(local.getUTCHours()) + ':' + pad(local.getUTCMinutes()), hour: local.getUTCHours(), minute: local.getUTCMinutes(), price: Math.round(parseFloat(s.price) * 100) / 100 });
    }
  }
  if (!qp.length) { document.getElementById('content').innerHTML = '<div class="section section--grey"><div class="container"><div class="error">No slots found for this delivery date.</div></div></div>'; return; }

  const prices = qp.map(p => p.price);
  const mn = Math.min(...prices), mx = Math.max(...prices);
  const av = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length * 100) / 100;
  const neg = qp.filter(p => p.price < 0), negCount = neg.length;

  const runs = []; let i = 0;
  while (i < qp.length) { if (qp[i].price < 0) { let j = i; while (j < qp.length && qp[j].price < 0) j++; runs.push(qp.slice(i, j)); i = j; } else i++; }
  const hrRuns = runs.filter(r => r.length >= 4);

  const hourly = {};
  for (const p of qp) { if (!hourly[p.hour]) hourly[p.hour] = []; hourly[p.hour].push(p.price); }
  const deepNegHours = [];
  for (const h of Object.keys(hourly).map(Number).sort((a, b) => a - b)) {
    if (hourly[h].length === 4) {
      const havg = Math.round(hourly[h].reduce((a, b) => a + b, 0) / 4 * 100) / 100;
      if (havg <= -10) { const label = h < 23 ? `${pad(h)}:00-${pad(h+1)}:00` : '23:00-00:00'; deepNegHours.push({ hour: h, label, avg: havg, prices: hourly[h] }); }

  document.getElementById('content').innerHTML = `

          <div class="metric"><span class="metric-icon" style="color:var(--engie-orange);font-weight:900">&#9888;</span><span class="metric-value ${negCount>0?'danger':''}">${negCount}</span><div class="metric-label">Negative slots</div></div>
          <div class="metric"><span class="metric-icon">&#8634;</span><span class="metric-value ${hrRuns.length>0?'danger':''}">${hrRuns.length}</span><div class="metric-label">≥1h neg. runs</div></div>

/* ── YTD helpers ── */
let ytdCache = null;

async function fetchDay(dateStr) {
  const url = `https://griddata.elia.be/eliabecontrols.prod/interface/Interconnections/daily/auctionresultsqh/${dateStr}`;
  try { const resp = await fetch(url, { headers: { 'Accept': 'application/json' } }); return await resp.json(); } catch { return []; }
}

function processDayForYTD(dateObj, data) {
  const slots = data.filter(s => s.isVisible !== false);
  if (!slots.length) return [];
  const offset = beOffset(dateObj); const hourly = {};
  for (const s of slots) {
    const dt = new Date(s.dateTime); const local = new Date(dt.getTime() + offset * 3600000);
    const dLocal = new Date(local.getUTCFullYear(), local.getUTCMonth(), local.getUTCDate());
    if (dLocal.getFullYear() === dateObj.getFullYear() && dLocal.getMonth() === dateObj.getMonth() && dLocal.getDate() === dateObj.getDate()) {
      const h = local.getUTCHours(); if (!hourly[h]) hourly[h] = []; hourly[h].push(Math.round(parseFloat(s.price) * 100) / 100);
    }
  }
  const result = [];
  for (const h of Object.keys(hourly).map(Number).sort((a, b) => a - b)) {
    if (hourly[h].length === 4) { const avg = Math.round(hourly[h].reduce((a, b) => a + b, 0) / 4 * 100) / 100;
      if (avg <= -10) { const label = h < 23 ? `${pad(h)}:00-${pad(h+1)}:00` : '23:00-00:00'; result.push({ date: fmtDate(dateObj), hour: h, label, avg, prices: hourly[h] }); }
    }
  }
  return result;
}

async function scanYear(year, endDate, progressCb) {
  const start = new Date(year, 0, 1), end = new Date(endDate), days = [], d = new Date(start);
  while (d <= end) { days.push(new Date(d)); d.setDate(d.getDate() + 1); }
  const allHours = []; let done = 0; const batchSize = 10;
  for (let i = 0; i < days.length; i += batchSize) {
    const batch = days.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(async (day) => { const data = await fetchDay(fmtDate(day)); return processDayForYTD(day, data); }));
    for (const r of results) allHours.push(...r);
    done += batch.length; if (progressCb) progressCb(done, days.length, allHours.length);
  }
  return allHours;
}

async function loadYTD() {
  document.getElementById('date-label').textContent = '';
  if (chart) { chart.destroy(); chart = null; }
  if (ytdChart) { ytdChart.destroy(); ytdChart = null; }
  if (ytdCache) { renderYTD(ytdCache.current, ytdCache.prev); return; }

  const today = new Date(), year = today.getFullYear(), prevYear = year - 1;
  const prevEndDate = new Date(prevYear, today.getMonth(), today.getDate() + 1);
  const totalCurrentDays = Math.ceil((new Date(today.getTime() + 86400000) - new Date(year, 0, 1)) / 86400000);
  const totalPrevDays = Math.ceil((prevEndDate - new Date(prevYear, 0, 1)) / 86400000);
  const totalDays = totalCurrentDays + totalPrevDays;

  document.getElementById('content').innerHTML = `
    <div class="section section--grey"><div class="container">
      <p class="subtitle">Scanning ${year} and ${prevYear} (same period) for full hours with avg ≤ -10 EUR/MWh...</p>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="ytd-progress" style="width:0%"></div></div>
      <div id="ytd-progress-text" style="font-size:13px;color:var(--grey-600);text-align:center;margin-top:8px;">0 / ${totalDays} days</div>
    </div></div>`;

  let globalDone = 0;
  const updateProgress = (found) => { const pct = Math.round(globalDone / totalDays * 100); const bar = document.getElementById('ytd-progress'); const txt = document.getElementById('ytd-progress-text'); if (bar) bar.style.width = pct + '%'; if (txt) txt.textContent = `${globalDone} / ${totalDays} days (${found} negative hours found)`; };

  const prevHours = await scanYear(prevYear, prevEndDate, (done, total, found) => { globalDone = done; updateProgress(found); });
  const prevDone = globalDone;
  const currentEnd = new Date(today); currentEnd.setDate(currentEnd.getDate() + 1);
  const currentHours = await scanYear(year, currentEnd, (done, total, found) => { globalDone = prevDone + done; updateProgress(prevHours.length + found); });

  ytdCache = { current: currentHours, prev: prevHours };
  renderYTD(currentHours, prevHours);
}

function renderYTD(allHours, prevYearHours) {
  const year = new Date().getFullYear(), prevYear = year - 1;
  const totalHours = allHours.length, prevTotalHours = prevYearHours ? prevYearHours.length : 0;
  const deepest = totalHours > 0 ? Math.min(...allHours.map(h => h.avg)) : 0;

  const byDate = {}; for (const h of allHours) { if (!byDate[h.date]) byDate[h.date] = []; byDate[h.date].push(h); }
  const sortedDates = Object.keys(byDate).sort();
  const prevByDate = {}; if (prevYearHours) { for (const h of prevYearHours) { if (!prevByDate[h.date]) prevByDate[h.date] = []; prevByDate[h.date].push(h); } }

  /* Event metrics */
  const eventCount = Object.keys(byDate).length;
  const avgHoursPerEvent = eventCount > 0 ? (totalHours / eventCount).toFixed(1) : '0';
  const holidayEventCount = sortedDates.filter(d => isHoliday(d)).length;
  const schoolHolEventCount = sortedDates.filter(d => isSchoolHoliday(d)).length;

  /* Weekend vs weekday */
  const wkendCur = allHours.filter(h => isWeekend(h.date)), wkdayCur = allHours.filter(h => !isWeekend(h.date));
  const wkendPrev = prevYearHours ? prevYearHours.filter(h => isWeekend(h.date)) : [], wkdayPrev = prevYearHours ? prevYearHours.filter(h => !isWeekend(h.date)) : [];
  const today = new Date();
  function countDayTypes(yr, endDate) { let wkend = 0, wkday = 0; const d = new Date(yr, 0, 1), end = new Date(endDate); while (d <= end) { const dow = d.getDay(); if (dow === 0 || dow === 6) wkend++; else wkday++; d.setDate(d.getDate() + 1); } return { wkend, wkday }; }
  const curCounts = countDayTypes(year, today), prevEndDate = new Date(prevYear, today.getMonth(), today.getDate()), prevCounts = countDayTypes(prevYear, prevEndDate);
  const curWkendRate = curCounts.wkend > 0 ? (wkendCur.length / curCounts.wkend).toFixed(2) : '0';
  const curWkdayRate = curCounts.wkday > 0 ? (wkdayCur.length / curCounts.wkday).toFixed(2) : '0';
  const prevWkendRate = prevCounts.wkend > 0 ? (wkendPrev.length / prevCounts.wkend).toFixed(2) : '0';
  const prevWkdayRate = prevCounts.wkday > 0 ? (wkdayPrev.length / prevCounts.wkday).toFixed(2) : '0';
  const curWkendDays = new Set(wkendCur.map(h => h.date)).size, curWkdayDays = new Set(wkdayCur.map(h => h.date)).size;
  const prevWkendDays = new Set(wkendPrev.map(h => h.date)).size, prevWkdayDays = new Set(wkdayPrev.map(h => h.date)).size;

  function pctBar(weekend, weekday) {
    const total = weekend + weekday;
    if (total === 0) return '<div style="font-size:12px;color:var(--grey-500)">No negative hours</div>';
    const wePct = Math.round(weekend / total * 100), wdPct = 100 - wePct;
    return `<div class="wk-bar-wrap"><span class="wk-bar-label">${wePct}% wknd</span><div style="flex:1;display:flex;height:8px;border-radius:4px;overflow:hidden"><div style="width:${wePct}%;background:${C.purple}"></div><div style="width:${wdPct}%;background:${C.red}"></div></div><span class="wk-bar-label">${wdPct}% wkday</span></div>`;
  }

  /* Monthly aggregation */
  const byMonth = {}; for (const h of allHours) { const m = h.date.slice(5, 7); if (!byMonth[m]) byMonth[m] = 0; byMonth[m]++; }
  const prevByMonth = {}; if (prevYearHours) { for (const h of prevYearHours) { const m = h.date.slice(5, 7); if (!prevByMonth[m]) prevByMonth[m] = 0; prevByMonth[m]++; } }
  const diff = totalHours - prevTotalHours;
  const diffLabel = diff > 0 ? `+${diff} vs ${prevYear}` : diff < 0 ? `${diff} vs ${prevYear}` : `same as ${prevYear}`;
  const diffColor = diff > 0 ? 'positive' : diff < 0 ? 'danger' : '';
  const monthLabels = [], monthValues = [], prevMonthValues = [];
  for (let m = 0; m < 12; m++) { const mm = pad(m + 1); monthLabels.push(new Date(year, m, 1).toLocaleString('en', { month: 'short' })); monthValues.push(byMonth[mm] || 0); prevMonthValues.push(prevByMonth[mm] || 0); }

  let tableRows = '';
  for (const dt of sortedDates) {
    const entries = byDate[dt], dayDeepest = Math.min(...entries.map(e => e.avg));
    const dayName = new Date(dt + 'T12:00:00').toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
    const isWe = isWeekend(dt);
    const weTag = isWe ? ` <span style="font-size:11px;color:${C.purple};font-weight:700">WE</span>` : '';
    const holiday = isHoliday(dt);
    const holTag = holiday ? ` <span style="font-size:11px;color:var(--engie-teal);font-weight:700" title="${holiday}">&#127988; ${holiday}</span>` : '';
    const school = isSchoolHoliday(dt);
    const schoolTag = school ? ` <span style="font-size:11px;color:var(--engie-orange);font-weight:700" title="${school}">&#127891; ${school}</span>` : '';
    const rowBg = isWe ? 'rgba(31,16,109,0.03)' : (holiday ? 'rgba(35,210,181,0.05)' : (school ? 'rgba(255,165,0,0.04)' : ''));
    const rowStyle = rowBg ? ` style="background:${rowBg}"` : '';
    /* Start/end hour of event */
    const sortedHours = entries.map(e => e.hour).sort((a, b) => a - b);
    const startHour = pad(sortedHours[0]) + ':00';
    const endHour = pad(sortedHours[sortedHours.length - 1] + 1) + ':00';
    /* DA price stats for event: lowest & avg across all ≤-10 hours */
    const allSlotPrices = entries.flatMap(e => e.prices);
    const lowestDA = Math.min(...allSlotPrices).toFixed(2);
    const avgDA = (allSlotPrices.reduce((a,b) => a+b, 0) / allSlotPrices.length).toFixed(2);
    tableRows += `<tr class="ytd-day-row" data-date="${dt}"${rowStyle}><td>${dt}</td><td>${dayName}${weTag}${holTag}${schoolTag}</td><td style="font-weight:700">${entries.length}</td><td>${startHour}</td><td>${endHour}</td><td style="font-weight:700;color:var(--engie-red)">${dayDeepest.toFixed(2)}</td><td style="color:var(--engie-red)">${lowestDA}</td><td>${avgDA}</td><td class="imb-lowest" data-date="${dt}"><span class="imb-loading">…</span></td><td class="imb-avg" data-date="${dt}"><span class="imb-loading">…</span></td></tr>`;
    for (const e of entries) { tableRows += `<tr class="ytd-detail" data-parent="${dt}"><td></td><td></td><td colspan="2">${e.label}</td><td></td><td>${e.avg.toFixed(2)} EUR/MWh</td><td colspan="4">Slots: ${e.prices.map(p => p.toFixed(2)).join(', ')}</td></tr>`; }
  }

  document.getElementById('content').innerHTML = `
    <div class="section section--grey">
      <div class="container">
        <div class="section-title"><span class="text-gradient">Year-to-date ${year}</span></div>
        <p class="subtitle">Full hours with average ≤ -10 EUR/MWh</p>

          <div class="metric"><span class="metric-icon">&#8634;</span><span class="metric-value">${prevTotalHours}</span><div class="metric-label">Same period ${prevYear}</div></div>
          <div class="metric"><span class="metric-icon" style="color:var(--engie-red)">&#9660;</span><span class="metric-value danger">${deepest.toFixed(0)} EUR</span><div class="metric-label">Deepest hour avg</div></div>

          <div class="metric"><span class="metric-icon" style="color:var(--engie-blue)">&#128197;</span><span class="metric-value">${eventCount}</span><div class="metric-label">Event days</div></div>
          <div class="metric"><span class="metric-icon" style="color:var(--engie-blue)">&#8960;</span><span class="metric-value">${avgHoursPerEvent}</span><div class="metric-label">Avg hours / event</div></div>
          <div class="metric"><span class="metric-icon" style="color:var(--engie-teal)">&#127988;</span><span class="metric-value">${holidayEventCount}</span><div class="metric-label">On public holidays</div></div>
          <div class="metric"><span class="metric-icon" style="color:var(--engie-orange)">&#127891;</span><span class="metric-value">${schoolHolEventCount}</span><div class="metric-label">During school holidays</div></div>
        </div>
      </div>
    </div>
    <div class="section section--white">
      <div class="container">
        <div class="card fade-in">
          <div class="card-title"><span class="text-gradient">Weekend vs Weekday</span> — negative hours (avg ≤ -10 EUR/MWh)</div>
          <div class="wk-compare">
            <div class="wk-compare-col">
              <h4><span class="text-gradient">${year}</span></h4>
              <div class="wk-row"><span class="wk-label">Weekend hours</span><span class="wk-val danger">${wkendCur.length}</span></div>
              <div class="wk-row"><span class="wk-label">Weekday hours</span><span class="wk-val danger">${wkdayCur.length}</span></div>
              <div class="wk-row"><span class="wk-label">Weekend days affected</span><span class="wk-val">${curWkendDays} / ${curCounts.wkend}</span></div>
              <div class="wk-row"><span class="wk-label">Weekday days affected</span><span class="wk-val">${curWkdayDays} / ${curCounts.wkday}</span></div>
              <div class="wk-row"><span class="wk-label">Neg. hours / weekend day</span><span class="wk-val">${curWkendRate}</span></div>
              <div class="wk-row"><span class="wk-label">Neg. hours / weekday</span><span class="wk-val">${curWkdayRate}</span></div>
              ${pctBar(wkendCur.length, wkdayCur.length)}
            </div>
            <div class="wk-compare-col">
              <h4><span class="text-gradient">${prevYear}</span> <span style="font-weight:400;font-size:12px;color:var(--grey-600)">(same period)</span></h4>
              <div class="wk-row"><span class="wk-label">Weekend hours</span><span class="wk-val danger">${wkendPrev.length}</span></div>
              <div class="wk-row"><span class="wk-label">Weekday hours</span><span class="wk-val danger">${wkdayPrev.length}</span></div>
              <div class="wk-row"><span class="wk-label">Weekend days affected</span><span class="wk-val">${prevWkendDays} / ${prevCounts.wkend}</span></div>
              <div class="wk-row"><span class="wk-label">Weekday days affected</span><span class="wk-val">${prevWkdayDays} / ${prevCounts.wkday}</span></div>

          </div>

        </div>

  `;

  document.getElementById('retrieved').textContent = 'Scanned: ' + new Date().toISOString().replace(/\.\d+Z/, 'Z');

  const monthKeys = []; for (let m = 0; m < 12; m++) monthKeys.push(pad(m + 1));

  renderMonthlyChart();

  document.querySelectorAll('.ytd-day-row').forEach(row => {
    row.addEventListener('click', () => { const dt = row.dataset.date; document.querySelectorAll(`.ytd-detail[data-parent="${dt}"]`).forEach(r => { r.style.display = r.style.display === 'table-row' ? 'none' : 'table-row'; }); });
  });

  /* Async imbalance enrichment */
  (async () => {
    const offset = beOffset(new Date());
    const imbalanceData = await enrichEventsWithImbalance(allHours, byDate);
    for (const dt of sortedDates) {
      const entries = byDate[dt];
      const imbDay = imbalanceData[dt] || [];
      const imbStats = getImbalanceForHours(imbDay, entries, offset);
      const lowestCell = document.querySelector(`.imb-lowest[data-date="${dt}"]`);
      const avgCell = document.querySelector(`.imb-avg[data-date="${dt}"]`);
      if (lowestCell) lowestCell.innerHTML = imbStats.min !== null ? `<span style="color:var(--engie-red);font-weight:700">${imbStats.min.toFixed(2)}</span>` : '<span style="color:var(--grey-500)">n/a</span>';
      if (avgCell) avgCell.innerHTML = imbStats.avg !== null ? `${imbStats.avg.toFixed(2)}` : '<span style="color:var(--grey-500)">n/a</span>';
    }
  })();
}

/* ── Monthly chart ── */
window.renderMonthlyChart = function() {
  if (ytdChart) { ytdChart.destroy(); ytdChart = null; }
  const { _ytdMonthLabels: ml, _ytdMonthValues: mv, _ytdPrevMonthValues: pmv, _ytdMonthKeys: mk, _ytdYear: year, _ytdPrevYear: prevYear } = window;

  document.getElementById('ytd-back-btn').style.display = 'none'; document.getElementById('ytd-back-btn').style.setProperty('display','none','important');
  document.getElementById('ytd-chart-title').innerHTML = `<span class="text-gradient">Negative hours by month</span> <span style="font-weight:400;color:var(--grey-500);font-size:13px">— click a bar to drill down</span>`;
  document.getElementById('ytd-chart-legend').innerHTML = `<span><span class="legend-dot" style="background:${C.red}"></span>${year}</span><span><span class="legend-dot" style="background:${C.lightBlue}"></span>${prevYear} (same period)</span>`;

  const cfg = {
    type: 'bar',
    data: { labels: ml, datasets: [
      { label: String(year), data: mv, backgroundColor: C.red, borderRadius: 4, barPercentage: 0.8, categoryPercentage: 0.6 },
      { label: String(prevYear), data: pmv, backgroundColor: C.lightBlue, borderRadius: 4, barPercentage: 0.8, categoryPercentage: 0.6 }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (evt, elements) => { if (!elements.length) return; const idx = elements[0].index; if (mv[idx] === 0 && pmv[idx] === 0) return; drillDownMonth(mk[idx], ml[idx]); },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#212121', titleFont: { weight: 700 }, callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' hour(s)' } } },
      scales: { x: { grid: { display: false }, ticks: { autoSkip: false, font: { weight: 700 } } }, y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { stepSize: 1, callback: v => Number.isInteger(v) ? v : '' }, title: { display: true, text: 'Full hours', font: { weight: 700 } } } }
    }
  };
  cfg._weekendFlags = null;
  ytdChart = new Chart(document.getElementById('ytd-chart'), cfg);
};

function drillDownMonth(monthKey, monthName) {
  if (ytdChart) { ytdChart.destroy(); ytdChart = null; }
  const { _ytdYear: year, _ytdPrevYear: prevYear, _ytdByDate: byDate, _ytdPrevByDate: prevByDate } = window;
  const m = parseInt(monthKey, 10) - 1;
  const daysInMonth = Math.max(new Date(year, m + 1, 0).getDate(), new Date(prevYear, m + 1, 0).getDate());

  const dayLabels = [], dayValues = [], prevDayValues = [], dayDeepest = [], prevDayDeepest = [], weekendFlags = [];
  for (let d = 1; d <= daysInMonth; d++) {
    dayLabels.push(d);
    const entries = byDate[`${year}-${monthKey}-${pad(d)}`] || [], prevEntries = prevByDate[`${prevYear}-${monthKey}-${pad(d)}`] || [];
    dayValues.push(entries.length); prevDayValues.push(prevEntries.length);
    dayDeepest.push(entries.length > 0 ? Math.min(...entries.map(e => e.avg)).toFixed(1) : null);
    prevDayDeepest.push(prevEntries.length > 0 ? Math.min(...prevEntries.map(e => e.avg)).toFixed(1) : null);
    const dow = new Date(year, m, d).getDay(); weekendFlags.push(dow === 0 || dow === 6);
  }

  document.getElementById('ytd-back-btn').style.setProperty('display','inline-block','important');
  document.getElementById('ytd-chart-title').innerHTML = `<span class="text-gradient">${monthName}</span> — negative hours per day`;
  document.getElementById('ytd-chart-legend').innerHTML = `<span><span class="legend-dot" style="background:${C.red}"></span>${year}</span><span><span class="legend-dot" style="background:${C.lightBlue}"></span>${prevYear}</span><span><span class="legend-stripe"></span>Weekend</span>`;

  const cfg = {
    type: 'bar',
    data: { labels: dayLabels, datasets: [
      { label: String(year), data: dayValues, backgroundColor: C.red, borderRadius: 3, barPercentage: 0.8, categoryPercentage: 0.7 },
      { label: String(prevYear), data: prevDayValues, backgroundColor: C.lightBlue, borderRadius: 3, barPercentage: 0.8, categoryPercentage: 0.7 }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#212121', titleFont: { weight: 700 }, callbacks: {
        title: ctx => { const we = weekendFlags[ctx[0].dataIndex] ? ' (weekend)' : ''; return `${monthName} ${ctx[0].label}${we}`; },
        label: ctx => { const v = ctx.parsed.y, yr = ctx.datasetIndex === 0 ? year : prevYear; if (v === 0) return `${yr}: no negative hours`; const deep = ctx.datasetIndex === 0 ? dayDeepest[ctx.dataIndex] : prevDayDeepest[ctx.dataIndex]; return `${yr}: ${v} hour(s) | deepest avg: ${deep} EUR/MWh`; }
      }}},
      scales: {
        x: { grid: { display: false }, ticks: { autoSkip: false, callback: (v, i) => { const lbl = dayLabels[i]; const sfx = weekendFlags[i] ? '*' : ''; return (lbl % 5 === 1 || lbl === 1) ? lbl + sfx : (weekendFlags[i] ? lbl + '*' : ''); }, font: (ctx) => ({ size: 10, weight: weekendFlags[ctx.index] ? '900' : '400' }) }, title: { display: true, text: 'Day of month (* = weekend)', font: { weight: 700 } } },
        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { stepSize: 1, callback: v => Number.isInteger(v) ? v : '' }, title: { display: true, text: 'Full hours', font: { weight: 700 } } }
      }
    }
  };
  cfg._weekendFlags = weekendFlags;
  ytdChart = new Chart(document.getElementById('ytd-chart'), cfg);
}

/* ── Navigation ── */
const today = new Date(), tomorrow = new Date(today);
tomorrow.setDate(tomorrow.getDate() + 1);
const btnToday = document.getElementById('btn-today'), btnTomorrow = document.getElementById('btn-tomorrow'), btnYtd = document.getElementById('btn-ytd');
function setActive(btn) { [btnToday, btnTomorrow, btnYtd].forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
btnToday.addEventListener('click', () => { setActive(btnToday); loadData(today); });
btnTomorrow.addEventListener('click', () => { setActive(btnTomorrow); loadData(tomorrow); });
btnYtd.addEventListener('click', () => { setActive(btnYtd); loadYTD(); });
btnTomorrow.classList.add('active');
loadData(tomorrow);
</script>
